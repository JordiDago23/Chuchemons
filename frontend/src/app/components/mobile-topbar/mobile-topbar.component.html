<header class="mobile-topbar" aria-label="Barra superior móvil">
  <div class="topbar-brand">
    <span class="brand-text">{{ brandName }}</span>
  </div>

  <div class="topbar-actions">
    <a 
      class="topbar-btn" 
      routerLink="/profile" 
      aria-label="Ir al perfil"
      title="Perfil"
    >
      <div class="topbar-avatar">{{ getAvatarText() }}</div>
    </a>

    <button 
      class="topbar-btn logout-btn" 
      (click)="onLogout()"
      aria-label="Cerrar sesión"
      title="Salir"
    >
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" focusable="false" aria-hidden="true">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" y1="12" x2="9" y2="12" />
      </svg>
    </button>
  </div>
</header>
