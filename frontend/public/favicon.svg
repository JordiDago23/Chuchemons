<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="c">
      <circle cx="16" cy="16" r="15"/>
    </clipPath>
  </defs>
  <!-- Red top half -->
  <circle cx="16" cy="16" r="15" fill="#e63946"/>
  <!-- White bottom half -->
  <rect x="1" y="16" width="30" height="15" fill="#ffffff" clip-path="url(#c)"/>
  <!-- Outer border -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Dividing line -->
  <line x1="1" y1="16" x2="31" y2="16" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Center button -->
  <circle cx="16" cy="16" r="5" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="16" cy="16" r="2.5" fill="#f5f5f5" stroke="#888" stroke-width="0.5"/>
</svg>
